<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo">
                <div class="logo-icon">F</div>
                <span class="logo-text">Fidelity<span>Pay</span></span>
            </div>
            <h1>Mot de passe oublié</h1>
            <p>Entrez votre adresse email pour recevoir un lien de réinitialisation.</p>
        </div>

        <div *ngIf="isSuccess()" class="success-message"
            style="background: #f0fdf4; border: 1px solid #bbf7d0; padding: 1.5rem; border-radius: 12px; text-align: center; margin-bottom: 2rem;">
            <span class="material-icons-outlined"
                style="font-size: 3rem; color: #22c55e; margin-bottom: 0.5rem;">check_circle</span>
            <h2 style="color: #166534; font-size: 1.2rem; margin-bottom: 0.5rem;">Email envoyé</h2>
            <p style="color: #15803d; font-size: 0.95rem;">Si un compte est associé à cette adresse email, vous recevrez
                un lien de réinitialisation d'ici quelques minutes.</p>
            <button class="btn btn-outline full-width" style="margin-top: 1.5rem;" (click)="backToLogin()">
                Retour à la connexion
            </button>
        </div>

        <form *ngIf="!isSuccess()" [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="email">Adresse Email</label>
                <div class="input-container"
                    [class.has-error]="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched">
                    <span class="material-icons-outlined">mail</span>
                    <input type="email" id="email" formControlName="email" placeholder="nom@entreprise.com">
                </div>
                <div class="field-error" *ngIf="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched">
                    Email valide requis
                </div>
            </div>

            <button type="submit" class="btn btn-primary full-width" [disabled]="!forgotForm.valid || isLoading()">
                <span *ngIf="!isLoading()">Envoyer le lien</span>
                <span *ngIf="isLoading()">Envoi en cours...</span>
            </button>

            <div *ngIf="errorMessage()" class="error-message">
                {{ errorMessage() }}
            </div>

            <button type="button" class="btn btn-outline full-width" style="margin-top: 1rem;" (click)="backToLogin()">
                Retour à la connexion
            </button>
        </form>

    </div>
</div>
