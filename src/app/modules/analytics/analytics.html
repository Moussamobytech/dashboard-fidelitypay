        </div>

            <button class="btn btn-outline">
                <span class="material-icons-outlined">filter_list</span>
                Filtres
            </button>
            <button class="btn btn-primary">
                <span class="material-icons-outlined">download</span>
                Exporter Rapport
            </button>
        </div>
    </header>

    <!-- Charts Section -->
    <div class="charts-grid">
        <div class="card chart-card">
            <div class="card-header">
                <h3>Transactions Kkiapay</h3>
                <div class="chart-legend-custom">
                    <span class="dot kkiapay"></span> Volume
                </div>
            </div>
            <div class="chart-body">
                <canvas baseChart [data]="kkiapayChartData" [options]="barChartOptions" [type]="barChartType">
                </canvas>
            </div>
        </div>

        <div class="card chart-card">
            <div class="card-header">
                <h3>Transactions PayDunya</h3>
                <div class="chart-legend-custom">
                    <span class="dot paydunya"></span> Volume
                </div>
            </div>
            <div class="chart-body">
                <canvas baseChart [data]="paydunyaChartData" [options]="barChartOptions" [type]="barChartType">
                </canvas>
            </div>
        </div>
    </div>
